<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一的變調翻卡記憶練習</title>
    <style>
        :root {
            --primary-color: #ff85a2;
            --bg-color: #fff5f7;
            --card-front: #ffffff;
            --card-back: #fff9db;
            --whatsapp-green: #25d366;
            --font-stack: "Yuanti SC", "YouYuan", "STYuanti-SC-Regular", "Microsoft JhengHei", sans-serif;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: var(--font-stack);
            background-color: var(--bg-color);
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .header-title {
            position: absolute; top: 15px; right: 20px;
            font-size: 14px; color: #d66d85; z-index: 100; font-weight: bold;
        }

        /* 登錄介面 */
        #login-screen {
            position: fixed; inset: 0; background: white;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }

        .login-box {
            background: #fff; padding: 40px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 133, 162, 0.2);
            max-width: 320px; width: 100%; text-align: center;
            border: 4px solid var(--bg-color);
        }

        input {
            width: 100%; padding: 15px; margin: 12px 0;
            border: 2px solid #ffe0e6; border-radius: 15px;
            box-sizing: border-box; font-size: 16px; outline: none;
        }

        button {
            background: var(--primary-color); color: white; border: none;
            padding: 15px 30px; border-radius: 50px; cursor: pointer;
            font-size: 18px; font-weight: bold;
            box-shadow: 0 6px 0 #d66d85; transition: 0.1s;
            margin-top: 10px; width: 100%;
        }
        button:active { transform: translateY(3px); box-shadow: 0 2px 0 #d66d85; }

        /* 主遊戲畫面 */
        #game-screen { display: none; height: 100%; flex-direction: column; align-items: center; justify-content: space-around; padding: 20px 0; box-sizing: border-box; }

        .progress { font-size: 20px; color: #d66d85; font-weight: bold; background: #fff; padding: 5px 20px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }

        /* 卡片設計 */
        .card-container { width: 300px; height: 380px; perspective: 1000px; cursor: pointer; }
        .card-inner {
            position: relative; width: 100%; height: 100%;
            text-align: center; transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform-style: preserve-3d;
        }
        .card-inner.is-flipped { transform: rotateY(180deg); }
        .card-face {
            position: absolute; width: 100%; height: 100%;
            backface-visibility: hidden; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            border-radius: 35px; border: 12px solid white;
            box-shadow: 0 15px 35px rgba(214, 109, 133, 0.15); box-sizing: border-box;
        }
        .card-front { background: var(--card-front); }
        .card-back { background: var(--card-back); transform: rotateY(180deg); }

        .pinyin { font-size: 38px; font-family: "Calibri", sans-serif; color: #ff6b6b; letter-spacing: 1px; }
        .word { font-size: 78px; font-weight: bold; color: #444; }

        .controls { display: flex; gap: 10px; width: 90%; max-width: 400px; }
        .btn-nav { background: #ffb3c6; box-shadow: 0 6px 0 #e89fb2; flex: 1; padding: 12px 10px; font-size: 16px; }
        .btn-audio { background: #ffd43b; box-shadow: 0 6px 0 #f59f00; color: #856404; flex: 1.2; padding: 12px 10px; font-size: 16px; }

        /* 彙總頁 */
        #summary-screen { display: none; padding: 40px 20px; overflow-y: auto; height: 100%; box-sizing: border-box; }
        
        .full-audio-player {
            background: white; padding: 20px; border-radius: 25px; margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.1); text-align: center; border: 2px dashed #ffb3c6;
        }
        
        .whatsapp-btn {
            background: var(--whatsapp-green) !important;
            box-shadow: 0 6px 0 #128c7e !important;
            margin-bottom: 20px;
        }

        .summary-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .summary-item {
            background: white; padding: 20px; border-radius: 25px;
            text-align: center; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent; transition: 0.2s;
        }
        .summary-item:active { background: var(--card-back); border-color: var(--primary-color); }

        .copyright { font-size: 12px; color: #aaa; line-height: 1.6; margin-top: 30px; text-align: center; }
    </style>
</head>
<body>

<div class="header-title">一的變調翻卡記憶練習</div>
<audio id="audio-sprite" src="一的變調.mp3" preload="auto"></audio>

<div id="login-screen">
    <div class="login-box">
        <h2 style="color: var(--primary-color); margin-bottom: 5px; font-size: 28px;">🚀 一的變調</h2>
        <p style="font-size: 14px; color: #b5838d; margin-bottom: 20px;">請輸入內部資訊開始練習</p>
        <input type="text" id="username" placeholder="請輸入您的姓名">
        <input type="password" id="password" placeholder="輸入密碼 ">
        <button onclick="handleLogin()">開始練習 🚀</button>
        <div class="copyright">
            網頁僅供VTC內部使用。<br>
            職業訓練局普通話培訓測試中心 版權所有。
        </div>
    </div>
</div>

<div id="game-screen">
    <div class="progress" id="progress-text">詞語 1 / 45</div>
    <div class="card-container" onclick="flipCard()">
        <div class="card-inner" id="main-card">
            <div class="card-face card-front">
                <div class="pinyin" id="display-pinyin">yì bǎ</div>
                <div style="margin-top: 40px; color: #ffd1dc; font-size: 16px;">點擊翻轉 👆</div>
            </div>
            <div class="card-face card-back">
                <div class="word" id="display-word">一把</div>
            </div>
        </div>
    </div>
    <div class="controls">
        <button class="btn-nav" onclick="prevCard(event)">⬅️ 上一張</button>
        <button class="btn-audio" onclick="playCurrentAudio(event)">🔈 聽發音</button>
        <button class="btn-nav" onclick="nextCard(event)">下一張 ➡️</button>
    </div>
</div>

<div id="summary-screen">
    <h2 style="text-align: center; color: var(--primary-color); font-size: 30px;">🌟 練習成果</h2>
    
    <div style="text-align: center; margin-bottom: 25px;">
        <button class="whatsapp-btn" onclick="copyAndShare()">✅ 已完成跟讀錄音打卡！</button>
        <p style="font-size: 12px; color: #888; margin-top: -10px;">(點擊後自動複製資訊並前往 WhatsApp)</p>
    </div>

    <div class="full-audio-player">
        <h3 style="color:#d66d85; font-size: 16px; margin-bottom: 10px;">🎧 完整錄音複習 (45詞)</h3>
        <audio id="full-audio-player" style="width:100%" controls src="一的變調.mp3"></audio>
    </div>

    <div class="summary-grid" id="summary-list"></div>
    
    <div style="text-align: center; margin-top: 40px; padding-bottom: 50px;">
        <button style="background:#95a5a6; box-shadow:0 6px 0 #7f8c8d; width: auto;" onclick="location.reload()">重新挑戰</button>
    </div>
</div>

<script>
    // 45 個詞語數據清單
    const wordData = [
        { word: "一把", pinyin: "yì bǎ", start: 1, duration: 2 },
        { word: "一本", pinyin: "yì běn", start: 3.5, duration: 2 },
        { word: "一部", pinyin: "yí bù", start: 5.5, duration: 2 },
        { word: "一場", pinyin: "yì cháng", start: 7.5, duration: 2 },
        { word: "一場", pinyin: "yì chǎng", start: 10.0, duration: 2 },
        { word: "一道", pinyin: "yí dào", start: 12.5, duration: 2 },
        { word: "一滴", pinyin: "yì dī", start: 15.0, duration: 2 },
        { word: "一頂", pinyin: "yì dǐng", start: 17.5, duration: 2 },
        { word: "一對", pinyin: "yí duì", start: 20.0, duration: 2 },
        { word: "一朵", pinyin: "yì duǒ", start: 22.5, duration: 2 },
        { word: "一份", pinyin: "yí fèn", start: 25.0, duration: 2 },
        { word: "一幅", pinyin: "yì fú", start: 27.5, duration: 2 },
        { word: "一副", pinyin: "yí fù", start: 30.0, duration: 2 },
        { word: "一個", pinyin: "yí gè", start: 32.5, duration: 2 },
        { word: "一根", pinyin: "yì gēn", start: 35.0, duration: 2 },
        { word: "一家", pinyin: "yì jiā", start: 37.5, duration: 2 },
        { word: "一架", pinyin: "yí jià", start: 40.0, duration: 2 },
        { word: "一間", pinyin: "yì jiān", start: 42.5, duration: 2 },
        { word: "一件", pinyin: "yí jiàn", start: 45.0, duration: 2 },
        { word: "一節", pinyin: "yì jié", start: 47.5, duration: 2.5 },
        { word: "一棵", pinyin: "yì kē", start: 50.5, duration: 2 },
        { word: "一顆", pinyin: "yì kē", start: 53.5, duration: 2 },
        { word: "一口", pinyin: "yì kǒu", start: 55.5, duration: 2.5 },
        { word: "一塊", pinyin: "yí kuài", start: 58.5, duration: 2 },
        { word: "一粒", pinyin: "yí lì", start: 61.0, duration: 2 },
        { word: "一輛", pinyin: "yí liàng", start: 63.5, duration: 2.5 },
        { word: "一門", pinyin: "yì mén", start: 66.5, duration: 2 },
        { word: "一面", pinyin: "yí miàn", start: 69, duration: 2 },
        { word: "一名", pinyin: "yì míng", start: 71.5, duration: 2.5 },
        { word: "一盤", pinyin: "yì pán", start: 74.5, duration: 2 },
        { word: "一匹", pinyin: "yì pǐ", start: 77.0, duration: 2 },
        { word: "一片", pinyin: "yí piàn", start: 79.5, duration: 2 },
        { word: "一扇", pinyin: "yí shàn", start: 82.0, duration: 2 },
        { word: "一雙", pinyin: "yì shuāng", start: 84.5, duration: 2 },
        { word: "一所", pinyin: "yì suǒ", start: 87.0, duration: 2 },
        { word: "一臺", pinyin: "yì tái", start: 90, duration: 2 },
        { word: "一套", pinyin: "yí tào", start: 92.5, duration: 2 },
        { word: "一條", pinyin: "yì tiáo", start: 95, duration: 2 },
        { word: "一頭", pinyin: "yì tóu", start: 98, duration: 2 },
        { word: "一位", pinyin: "yí wèi", start: 100.5, duration: 2.5 },
        { word: "一項", pinyin: "yí xiàng", start: 102.9, duration: 2 },
        { word: "一張", pinyin: "yì zhāng", start: 105, duration: 2 },
        { word: "一隻", pinyin: "yì zhī", start: 107.5, duration: 2.5 },
        { word: "一支", pinyin: "yì zhī", start: 110, duration: 2 },
        { word: "一座", pinyin: "yí zuò", start: 112.8, duration: 2.5 }
    ];

    let currentIndex = 0;
    let userName = ""; 
    const audio = document.getElementById('audio-sprite');

    function handleLogin() {
        const pass = document.getElementById('password').value;
        userName = document.getElementById('username').value;
        if (userName === "") { alert("請輸入姓名"); return; }
        if (pass === "vtcpsc") {
            audio.play().then(() => {
                audio.pause();
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                updateCard();
            }).catch(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('game-screen').style.display = 'flex';
                updateCard();
            });
        } else {
            alert("密碼輸入錯誤，請輸入正確密碼");
        }
    }

    function updateCard() {
        const card = document.getElementById('main-card');
        card.classList.remove('is-flipped');
        document.getElementById('display-word').innerText = wordData[currentIndex].word;
        document.getElementById('display-pinyin').innerText = wordData[currentIndex].pinyin;
        document.getElementById('progress-text').innerText = `詞語 ${currentIndex + 1} / ${wordData.length}`;
    }

    function flipCard() {
        const card = document.getElementById('main-card');
        if (!card.classList.contains('is-flipped')) {
            card.classList.add('is-flipped');
            playAudio(currentIndex);
        } else {
            card.classList.remove('is-flipped');
        }
    }

    let audioTimeout;
    function playAudio(index) {
        document.getElementById('full-audio-player').pause();
        clearTimeout(audioTimeout);
        const item = wordData[index];
        audio.currentTime = item.start;
        audio.play();
        audioTimeout = setTimeout(() => { audio.pause(); }, item.duration * 1000);
    }

    function playCurrentAudio(e) { e.stopPropagation(); playAudio(currentIndex); }
    
    function nextCard(e) {
        e.stopPropagation();
        if (currentIndex < wordData.length - 1) { currentIndex++; updateCard(); }
        else { showSummary(); }
    }
    
    function prevCard(e) { e.stopPropagation(); if (currentIndex > 0) { currentIndex--; updateCard(); } }

    function showSummary() {
        document.getElementById('game-screen').style.display = 'none';
        const summaryScreen = document.getElementById('summary-screen');
        summaryScreen.style.display = 'block';
        const list = document.getElementById('summary-list');
        list.innerHTML = '';
        wordData.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'summary-item';
            div.innerHTML = `<div style="font-size:14px; color:#ff85a2">${item.pinyin}</div>
                             <div style="font-size:26px; font-weight:bold; color:#444">${item.word}</div>`;
            div.onclick = () => playAudio(index);
            list.appendChild(div);
        });
    }

    function copyAndShare() {
        const now = new Date();
        const dateStr = `${now.getFullYear()}/${now.getMonth() + 1}/${now.getDate()}`;
        const timeStr = `${now.getHours()}:${now.getMinutes().toString().padStart(2, '0')}`;
        
        const shareText = `【普通話一的變調練習打卡】\n👤 學習者：${userName}\n📅 完成日期：${dateStr}\n⏰ 完成時間：${timeStr}\n✅ 狀態：已完成全部 45 個詞語跟讀練習！`;

        navigator.clipboard.writeText(shareText).then(() => {
            alert("✨ 打卡資訊已複製！\n現在將跳轉至 WhatsApp。");
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(shareText);
        }).catch(err => {
            window.location.href = "whatsapp://send?text=" + encodeURIComponent(shareText);
        });
    }
</script>

</body>
</html>
